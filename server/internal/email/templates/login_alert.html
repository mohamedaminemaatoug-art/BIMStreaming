<!doctype html>
<html>
  <body style="font-family:Arial,sans-serif;background:#f5f7fb;color:#132238;padding:24px;">
    <div style="max-width:640px;margin:0 auto;background:#fff;border-radius:16px;padding:32px;border:1px solid #e6eaf2;">
      <h1 style="margin:0 0 12px;">New login detected</h1>
      <p>A new login was detected from <strong>{{.country}}</strong> {{if .city}}in <strong>{{.city}}</strong>{{end}} at {{.when}}.</p>
      <p style="margin-top:16px;">Device: {{.device_info}}</p>
    </div>
  </body>
</html>
