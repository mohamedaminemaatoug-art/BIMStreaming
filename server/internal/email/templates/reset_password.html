<!doctype html>
<html>
  <body style="font-family:Arial,sans-serif;background:#f5f7fb;color:#132238;padding:24px;">
    <div style="max-width:640px;margin:0 auto;background:#fff;border-radius:16px;padding:32px;border:1px solid #e6eaf2;">
      <h1 style="margin:0 0 12px;">Reset your password</h1>
      <p>Your password reset code is:</p>
      <div style="background:#f0f2f5;border-radius:8px;padding:20px;text-align:center;margin:20px 0;">
        <p style="margin:0;font-size:28px;font-weight:bold;letter-spacing:4px;font-family:monospace;color:#0b5fff;">{{.code}}</p>
      </div>
      <p>This code expires in {{.expires}}.</p>
      <p style="font-size:12px;color:#666;">Do not share this code with anyone.</p>
    </div>
  </body>
</html>
