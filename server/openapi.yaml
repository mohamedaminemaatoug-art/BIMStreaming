      responses:
        '200': { description: Deleted }
  /communities/{id}/members/{user_id}/ban:
    post:
      summary: Ban a community member
      tags: [Communities]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/CommunityId'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
                expires_at: { type: string, format: date-time }
      responses:
        '201': { description: Banned }
    delete:
      summary: Unban a community member
      tags: [Communities]
      security: [{ bearerAuth: [] }]
