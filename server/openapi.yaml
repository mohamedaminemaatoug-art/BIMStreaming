        '200': { description: Audit events }
  /remote/invite/{user_id}:
    post:
      summary: Request a remote session invite
      tags: [Remote]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '201': { description: Invite created }
  /remote/invite/{id}:
    patch:
      summary: Accept or reject a remote session invite
      tags: [Remote]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [accept, reject]
      responses:
        '200': { description: Updated invite }
  /remote/sessions:
    post:
      summary: Create a remote session record
      tags: [Remote]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host_user_id, host_device_id, session_token]
              properties:
                host_user_id: { type: string, format: uuid }
                host_device_id: { type: string }
                invite_id: { type: string, format: uuid }
                session_type:
                  type: string
                  enum: [control, view_only, file_transfer, presentation]
                quality:
                  type: string
                  enum: [auto, low, medium, high, ultra]
                session_token: { type: string }
      responses:
        '201': { description: Session created }
  /remote/sessions/{id}:
    get:
      summary: Get a remote session
      tags: [Remote]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Session }
  /remote/sessions/{id}/permissions:
    patch:
      summary: Update remote session permissions
      tags: [Remote]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Updated permissions }
  /remote/sessions/{id}/quality:
    patch:
      summary: Update remote session quality
      tags: [Remote]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Updated quality }
  /remote/sessions/{id}/stats:
    patch:
      summary: Update remote session statistics
      tags: [Remote]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Updated stats }
  /remote/sessions/{id}/end:
    post:
      summary: End a remote session
      tags: [Remote]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Session ended }
  /remote/unattended-access:
    get:
      summary: List unattended access rules
      tags: [Remote]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Unattended access rules }
    post:
      summary: Create unattended access rule
      tags: [Remote]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [controller_user_id, password]
              properties:
                controller_user_id: { type: string, format: uuid }
                password: { type: string }
      responses:
        '201': { description: Created }
  /remote/unattended-access/{id}:
    delete:
      summary: Disable unattended access rule
      tags: [Remote]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Disabled }
  /remote/history:
    get:
      summary: Get remote activity history
      tags: [Remote]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Activity list }
  /notifications:
    get:
      summary: List notifications
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Notifications }
    post:
      summary: Create and dispatch a notification
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, type]
              properties:
                user_id: { type: string, format: uuid }
                type: { type: string }
                payload: { type: object, additionalProperties: true }
      responses:
        '201': { description: Created }
  /notifications/read:
    patch:
      summary: Mark all notifications read
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Updated }
  /notifications/{id}/read:
    patch:
      summary: Mark one notification read
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Updated }
  /ws:
    get:
      summary: WebSocket signaling and real-time events
      tags: [WebSocket]
      description: |
        Connect with ?token=<access_token>. The socket carries the existing remote-control
        signaling traffic plus event types such as user:online, dm:new, friend:request,
        community:message, community:join_request, remote:invite, and notification:new.
      responses:
        '101': { description: WebSocket upgrade }
  /healthz:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200': { description: ok }
components:
  parameters:
    UserId:
      in: path
      name: user_id
      required: true
      schema: { type: string, format: uuid }
    CommunityId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
  schemas:
    RegisterRequest:
      type: object
      required: [username, email, password, confirm_password]
      properties:
        username: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        password: { type: string }
        confirm_password: { type: string }
    VerifyEmailRequest:
      type: object
      required: [user_id, code]
      properties:
        user_id: { type: string, format: uuid }
        code: { type: string, pattern: '^[0-9]{6}$' }
    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier: { type: string }
        password: { type: string }
        device_fingerprint: { type: string }
        device_label: { type: string }
    ResetPasswordRequest:
      type: object
      required: [email, code, password, confirm_password]
      properties:
        email: { type: string, format: email }
        code: { type: string, pattern: '^[0-9]{6}$' }
        password: { type: string }
        confirm_password: { type: string }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
